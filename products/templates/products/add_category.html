{% extends 'base.html' %}
{% block content %}

<div class="container">
    <h3>Add Category</h3>
    <h1>ADD CATEGORY PAGE WORKING ✅</h1>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Description</label>
            <textarea name="description" class="form-control"></textarea>
        </div>

        <button class="btn btn-success">Save</button>
    </form>
</div>

{% endblock %}

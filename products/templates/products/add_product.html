{% extends 'base.html' %}

{% block title %}Add Product{% endblock %}

{% block content %}

<div class="container mt-4">
    <h2>Add Product</h2>

    <form method="POST" enctype="multipart/form-data" class="card p-4 shadow">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-success">Add Product</button>
    </form>
</div>

{% endblock %}

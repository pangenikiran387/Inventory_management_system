{% extends 'base.html' %}
{% block content %}

<div class="container">

    <div class="d-flex justify-content-between mb-3">
        <h3>🗂 Categories</h3>

        <a href="{% url 'products:add_category' %}" class="btn btn-success">
            ➕ Add Category
        </a>
    </div>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Description</th>
                <th width="180">Actions</th>
            </tr>
        </thead>

        <tbody>
            {% for category in categories %}
            <tr>
                <td>{{ category.name }}</td>
                <td>{{ category.description }}</td>

                <td>
                    <a href="{% url 'products:edit_category' category.id %}" class="btn btn-warning btn-sm">
                        Edit
                    </a>

                    <a href="{% url 'products:delete_category' category.id %}" 
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Delete this category?')">
                        Delete
                    </a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" class="text-center">No categories found</td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

</div>

{% endblock %}

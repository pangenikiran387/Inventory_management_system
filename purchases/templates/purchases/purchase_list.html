<h2>Purchase Orders</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Supplier</th>
        <th>Status</th>
        <th>Action</th>
    </tr>

    {% for p in purchases %}
    <tr>
        <td>PO-{{ p.id }}</td>
        <td>{{ p.supplier.name }}</td>
        <td>
            {% if p.is_confirmed %}
                ✅ Confirmed
            {% else %}
                ⏳ Pending
            {% endif %}
        </td>
        <td>
            {% if not p.is_confirmed %}
                <a href="{% url 'purchase:confirm_purchase' p.id %}">
                    Confirm
                </a>
            {% endif %}
        </td>
        <a href="{% url 'purchases:purchase_detail' p.id %}">
    View
</a>
    </tr>
    {% endfor %}
</table>

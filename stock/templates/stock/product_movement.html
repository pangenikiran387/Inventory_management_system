{% extends "base.html" %}
{% block content %}

<div class="container mt-4">
    <h3>Stock Movement - {{ product.name }}</h3>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Type</label>
            {{ form.type }}
        </div>

        <div class="mb-3">
            <label>Quantity</label>
            {{ form.quantity }}
        </div>

        <button class="btn btn-success">Submit</button>
    </form>
</div>

{% endblock %}
